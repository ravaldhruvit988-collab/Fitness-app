<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>Hello {{name}} 👋</h2>

    <p><b>BMI:</b> {{bmi}}</p>
    <p><b>Status:</b> {{category}}</p>
    <p><b>Goal:</b> {{goal}}</p>
    <p><b>Estimated Time:</b> {{days}} days</p>
    <p><b>Calories Needed:</b> {{tdee}} kcal</p>

    <h3>🍽 Diet Plan</h3>
    <ul>
        {% for d in diet %}
        <li>{{d}}</li>
        {% endfor %}
    </ul>

    <h3>🏋️ Workout Plan</h3>
    <ul>
        {% for w in workout %}
        <li>{{w}}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
