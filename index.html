<!DOCTYPE html>
<html>
<head>
    <title>Diet Plan & BMI Calculator</title>
    <style>
        body { font-family: Arial; text-align:center; margin-top:50px; }
        input, select, button { padding:10px; margin:5px; width:200px; }
        button { width: 220px; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Diet Plan & Calorie Calculator</h1>
    <form action="/calculate" method="post">
        <input type="number" name="weight" placeholder="Weight (kg)" required><br>
        <input type="number" name="height" placeholder="Height (cm)" required><br>
        <input type="number" name="age" placeholder="Age" required><br>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br>
        <select name="activity" required>
            <option value="">Activity Level</option>
            <option value="sedentary">Sedentary</option>
            <option value="light">Light Exercise</option>
            <option value="moderate">Moderate Exercise</option>
            <option value="active">Active</option>
            <option value="very">Very Active</option>
        </select><br>
        <button type="submit">Calculate</button>
    </form>
</body>
</html>
